<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<div style="cursor:pointer;font-family:Geist,system-ui,sans-serif">
  <div style="position:relative;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:{{ movie.posterColor }};border:1px solid rgba(255,255,255,.07);box-shadow:0 8px 20px rgba(0,0,0,.4)">
    <sc-if value="{{ movie.hasPoster }}" hint-placeholder-val="{{ true }}">
      <div style="position:absolute;inset:0;background:linear-gradient(155deg,rgba(255,255,255,.12),transparent 42%),linear-gradient(0deg,rgba(0,0,0,.74),transparent 52%)"></div>
      <div style="position:absolute;top:9px;left:10px;font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:.14em;color:rgba(255,255,255,.5)">CARTELL</div>
      <div style="position:absolute;left:12px;right:12px;bottom:12px">
        <div style="font-size:15px;font-weight:600;color:#fff;line-height:1.18;text-shadow:0 1px 4px rgba(0,0,0,.55)">{{ movie.title }}</div>
      </div>
    </sc-if>
    <sc-if value="{{ movie.noPoster }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:#1a1d22">
        <div style="width:42px;height:42px;border-radius:10px;border:1.5px dashed rgba(255,255,255,.22);position:relative"></div>
        <div style="font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:.14em;color:#5d636c">SENSE PÒSTER</div>
      </div>
    </sc-if>
    <div style="position:absolute;top:8px;right:8px;display:flex;align-items:center;background:rgba(8,9,11,.82);border:1px solid rgba(45,212,191,.32);padding:3px 8px;border-radius:999px">
      <span style="font-size:12px;font-weight:700;color:#2dd4bf;font-family:'Geist Mono',monospace">{{ movie.rating }}</span>
    </div>
  </div>
  <div style="margin-top:9px;font-size:13.5px;font-weight:600;color:#eef0f2;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ movie.title }}</div>
  <div style="margin-top:2px;font-size:11.5px;color:#9298a1;font-family:'Geist Mono',monospace">{{ movie.year }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:190,&quot;height&quot;:340},&quot;movie&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{title:string;year:number;rating:string;posterColor:string;hasPoster:boolean;noPoster:boolean}&quot;}}"></script>
</body>
</html>
